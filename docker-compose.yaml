services:
  frontend:
    build: /frontend
    ports: 
      - "3000:3000"
    networks:
      - network

  backend:
    build: /backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mini-trello
    networks:
      - network
    depends_on:
      - mongo
  
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - network
    volumes:
      - mongo-data:/data/db

networks:
  network:
    driver: bridge

volumes:
  mongo-data:
    driver: local